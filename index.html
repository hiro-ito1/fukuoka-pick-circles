<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1200">
<title>ピックルボール サークル・スクール一覧</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
         margin: 0; background: #f5f6f8; color: #1f2d3d; }
  header { background: #2e7d52; color: #fff; padding: 20px 24px; }
  header h1 { margin: 0; font-size: 22px; }
  header p { margin: 6px 0 0; font-size: 13px; opacity: .9; }
  .sitenav { background: #1a5c3a; padding: 9px 24px; display: flex; align-items: center;
             gap: 20px; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,.1); }
  .sitenav-label { color: rgba(255,255,255,.6); font-size: 12px; white-space: nowrap; }
  .sitenav-link { color: #ffffff; font-size: 13px; font-weight: 600; text-decoration: none;
                  letter-spacing: .02em; }
  .sitenav-link:hover { color: #f9f871; text-decoration: underline; }
  .sitenav-wip { color: #d4f1c0; font-size: 13px; }
  .wip-badge { font-size: 11px; font-weight: 600; background: rgba(255,255,255,.30);
               color: #d4f1c0; border: 1px solid rgba(255,255,255,.40);
               padding: 2px 8px; border-radius: 4px; margin-left: 6px;
               letter-spacing: .02em; vertical-align: middle; }
  .controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
              padding: 16px 24px; background: #fff; border-bottom: 1px solid #e3e6ea; }
  .tabs { display: flex; gap: 8px; }
  .tab { padding: 8px 18px; border: 1px solid #2e7d52; background: #fff; color: #2e7d52;
         border-radius: 20px; cursor: pointer; font-size: 14px; }
  .tab.active { background: #2e7d52; color: #fff; }
  .sort-box { margin-left: auto; font-size: 13px; }
  select { padding: 6px 10px; border-radius: 6px; border: 1px solid #ccd; font-size: 13px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
          gap: 16px; padding: 24px; }
  .card { background: #fff; border: 1px solid #d9dee4; border-radius: 12px; padding: 18px;
          cursor: pointer; transition: box-shadow .15s, transform .15s; }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.10); transform: translateY(-2px); }
  .card-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .name { font-weight: 700; font-size: 18px; color: #16202b; }
  .type-badge { font-size: 12px; padding: 3px 11px; border-radius: 10px; color: #fff; white-space: nowrap; font-weight: 600; }
  .type-badge.circle { background: #3a5f95; }
  .type-badge.school { background: #d96e15; }
  .venues { font-size: 14.5px; margin: 12px 0 8px; color: #26313d; line-height: 1.7; font-weight: 500; }
  .slots-block { margin: 10px 0; display: flex; flex-direction: column; gap: 7px; }
  .slot-row { display: flex; flex-wrap: wrap; align-items: center; gap: 7px; }
  .slot-row.muted { color: #8a94a0; font-size: 14px; }
  .slot-when { font-size: 14.5px; color: #16202b; font-weight: 700; min-width: 56px; }
  .slot-pills { display: flex; flex-wrap: wrap; gap: 5px; }
  .pill { font-size: 13px; background: #dcefe3; color: #1a6b41; padding: 3px 11px; border-radius: 10px; font-weight: 600; }
  .pill.muted { background: #ececec; color: #888; font-weight: 500; }
  .atmo { font-size: 14px; color: #3d4753; line-height: 1.65; min-height: 20px; margin-top: 4px; }
  .badges { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .badge { font-size: 12px; padding: 4px 11px; border-radius: 6px; font-weight: 600; }
  .badge.rental { background: #fff1e0; color: #c9640f; border: 1px solid #ffd0a0; }
  .badge.link { background: #e6edfb; color: #2a56c4; border: 1px solid #bccdf3; }
  .empty { padding: 60px; text-align: center; color: #999; }
  /* モーダル */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
              justify-content: center; align-items: center; padding: 20px; z-index: 10; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; max-width: 480px; width: 100%;
           max-height: 85vh; overflow-y: auto; padding: 24px; }
  .modal h2 { margin: 0 0 4px; font-size: 21px; color: #16202b; }
  .modal .row { margin: 14px 0; font-size: 14.5px; line-height: 1.7; color: #26313d; }
  .modal .label { font-weight: 700; color: #2e7d52; font-size: 13px; margin-bottom: 4px; }
  /* リンクをボタン（チップ）状にして押せると分かるようにする */
  .linkchip { display: inline-flex; align-items: center; gap: 6px;
              background: #eef4ff; color: #2456c7; border: 1px solid #b9cdf5;
              padding: 7px 13px; border-radius: 9px; text-decoration: none;
              font-weight: 700; font-size: 13.5px; margin: 0 8px 8px 0; }
  .linkchip:hover { background: #2456c7; color: #fff; border-color: #2456c7; }
  .linkchip .ext { font-size: 12px; opacity: .8; }
  .contact-line { margin-top: 4px; font-size: 14px; color: #26313d; }
  .close-btn { float: right; cursor: pointer; font-size: 22px; color: #999; line-height: 1; }
  .note { font-size: 12.5px; color: #6b7683; background: #f4f5f7; padding: 9px 12px; border-radius: 6px; }
</style>
</head>
<body>
<header>
  <h1>🥒 ピックルボール サークル・スクール一覧</h1>
  <p>福岡近郊で活動するサークル・スクールの紹介ページ（公開 1 件）</p>
</header>

<nav class="sitenav">
  <span class="sitenav-label">姉妹サイト：</span>
  <a class="sitenav-link" href="https://hiro-ito1.github.io/fukuoka-ten-shi/" target="_blank" rel="noopener">🎾 テニス試合情報</a>
  <a class="sitenav-link" href="https://hiro-ito1.github.io/fukuoka-pick/" target="_blank" rel="noopener">🥒 ピックルボール試合情報</a>
</nav>

<div class="controls">
  <div class="tabs">
    <div class="tab active" data-tab="サークル" onclick="setTab('サークル', this)">サークル</div>
    <div class="tab" data-tab="スクール" onclick="setTab('スクール', this)">スクール</div>
  </div>
  <div class="sort-box">
    並び替え:
    <select id="sortSel" onchange="applyFilter()">
      <option value="beginner">初心者から</option>
      <option value="advanced">上級から</option>
    </select>
  </div>
</div>

<div class="grid" id="grid">

    <div class="card" data-type="サークル" data-minlv="0" data-maxlv="5"
         data-id="circle_002" onclick="showDetail('circle_002')">
      <div class="card-head">
        <span class="name">春日ピックルボール道場</span>
        <span class="type-badge circle">サークル</span>
      </div>
      <div class="venues">📍 春日市総合スポーツセンター<br>📍 春日市内の学校体育館</div>
      <div class="slots-block"><div class='slot-row'><span class='slot-when'>🗓 土午後</span><span class='slot-pills'><span class='pill'>初心</span><span class='pill'>初級</span></span></div>
<div class='slot-row'><span class='slot-when'>🗓 土夜</span><span class='slot-pills'><span class='pill'>中級</span><span class='pill'>中上</span><span class='pill'>上級</span></span></div>
<div class='slot-row'><span class='slot-when'>🗓 日午後</span><span class='slot-pills'><span class='pill'>初級</span><span class='pill'>初中</span><span class='pill'>中級</span><span class='pill'>中上</span></span></div></div>
      <div class="atmo">20代〜60代まで幅広い年齢層の方が参加されています。</div>
      <div class="badges"><span class='badge rental'>パドルレンタルあり</span><span class='badge link'>🔗 HP・SNSあり</span></div>
    </div>
</div>
<div class="empty" id="empty" style="display:none">該当するサークル・スクールがありません。</div>

<div class="modal-bg" id="modalBg" onclick="closeDetail(event)">
  <div class="modal" id="modalBody" onclick="event.stopPropagation()"></div>
</div>

<script>
  const DETAILS = {"circle_002": {"name": "春日ピックルボール道場", "type": "サークル", "venues": ["春日市総合スポーツセンター", "春日市内の学校体育館"], "slots": "土午後・土夜・日午後", "slots_detail": [{"when": "土午後", "levels": ["初心", "初級"]}, {"when": "土夜", "levels": ["中級", "中上", "上級"]}, {"when": "日午後", "levels": ["初級", "初中", "中級", "中上"]}], "levels": ["初心", "初級", "初中", "中級", "中上", "上級"], "atmosphere": "20代〜60代まで幅広い年齢層の方が参加されています。", "rental": "あり", "links": [{"label": "Instagram", "url": "https://www.instagram.com/kasuga_pickleball_dojo/"}], "contact": "instaのDM"}};
  let currentTab = "サークル";

  function setTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    applyFilter();
  }

  function applyFilter() {
    const sort = document.getElementById('sortSel').value;
    const grid = document.getElementById('grid');
    let cards = Array.from(grid.querySelectorAll('.card'));

    cards.forEach(c => {
      c.style.display = (c.dataset.type === currentTab) ? '' : 'none';
    });

    const visible = cards.filter(c => c.style.display !== 'none');
    visible.sort((a, b) => {
      if (sort === 'beginner') {
        return (+a.dataset.minlv) - (+b.dataset.minlv);
      } else {
        return (+b.dataset.maxlv) - (+a.dataset.maxlv);
      }
    });
    visible.forEach(c => grid.appendChild(c));

    document.getElementById('empty').style.display = visible.length ? 'none' : 'block';
  }

  function showDetail(id) {
    const d = DETAILS[id];
    if (!d) return;
    const venues = d.venues.length ? d.venues.map(v => '📍 ' + esc(v)).join('<br>') : '—';
    const lvPill = l => "<span style='background:#e8f3ec;color:#2e7d52;padding:2px 9px;border-radius:10px;font-size:12px;margin-right:4px'>" + esc(l) + "</span>";
    const slotsHtml = (d.slots_detail && d.slots_detail.length)
      ? d.slots_detail.map(s => {
          const pills = s.levels.length
            ? s.levels.map(lvPill).join('')
            : "<span style='color:#999;font-size:12px'>レベル未設定</span>";
          return "<div style='margin:6px 0;display:flex;flex-wrap:wrap;align-items:center;gap:6px'>"
               + "<span style='font-weight:600;min-width:52px'>🗓 " + esc(s.when) + "</span>"
               + "<span>" + pills + "</span></div>";
        }).join('')
      : '—';
    const linkIcon = { "HP": "🌐", "Instagram": "📷", "X": "𝕏", "Facebook": "📘" };
    let linksHtml = d.links.map(l => {
      const ic = linkIcon[l.label] || "🔗";
      return "<a class='linkchip' href='" + esc(l.url) + "' target='_blank' rel='noopener'>"
           + ic + " " + esc(l.label) + " <span class='ext'>↗</span></a>";
    }).join('');
    if (d.contact) linksHtml += "<div class='contact-line'>✉ 連絡先: <strong>" + esc(d.contact) + "</strong></div>";
    if (!linksHtml) linksHtml = '—';

    document.getElementById('modalBody').innerHTML =
      "<span class='close-btn' onclick='closeDetail()'>&times;</span>" +
      "<h2>" + esc(d.name) + "</h2>" +
      "<div style='margin-bottom:8px'><span class='type-badge " + (d.type === 'スクール' ? 'school' : 'circle') + "'>" + esc(d.type) + "</span></div>" +
      "<div class='row'><div class='label'>開催場所</div>" + venues + "</div>" +
      "<div class='row'><div class='label'>曜日・時間帯 × レベル</div>" + slotsHtml + "</div>" +
      "<div class='row'><div class='label'>雰囲気・特徴</div>" + (esc(d.atmosphere) || '—') + "</div>" +
      "<div class='row'><div class='label'>パドルレンタル</div>" + esc(d.rental) + "</div>" +
      "<div class='row'><div class='label'>リンク・連絡先（タップで開く）</div>" + linksHtml + "</div>" +
      "<div class='row note'>参加費・詳細はHPをご確認ください。</div>";
    document.getElementById('modalBg').classList.add('open');
  }

  function closeDetail(e) {
    document.getElementById('modalBg').classList.remove('open');
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  applyFilter();
</script>
</body>
</html>
